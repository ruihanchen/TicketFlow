services:
  postgres:
    image: postgres:16-alpine
    container_name: ticketflow-postgres
    # Debezium requires wal_level=logical(pgoutput plugin). Default is replica which causes Debezium to fail
    # at startup with "logical decoding requires wal_level >= logical".
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_DB: ticketflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ticketflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4.1-alpine
    container_name: ticketflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: ticketflow-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d' # local dev only; default 15d is overkill
    extra_hosts:
      - "host.docker.internal:host-gateway" # Spring Boot runs on host, not in Docker

  grafana:
    image: grafana/grafana:11.2.2
    container_name: ticketflow-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ticketflow-grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false # explicit; default changed in some Grafana 11 builds
    depends_on:
      - prometheus # datasource provisioning queries Prometheus on startup

volumes:
  ticketflow-postgres-data:
  ticketflow-grafana-data:
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    # attached to every time series; useful when federating multiple Prometheus instances
    cluster: ticketflow-local
    environment: dev

scrape_configs:
  - job_name: ticketflow-app
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          # Spring Boot runs on the host, not in Docker; host.docker.internal resolves to the host IP
          - host.docker.internal:8080
        labels:
          service: ticketflow
          instance: app-1
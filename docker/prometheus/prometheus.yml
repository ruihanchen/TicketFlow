global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: ticketflow-local
    environment: dev

scrape_configs:
  - job_name: ticketflow-app
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - app:8080
        labels:
          service: ticketflow
          instance: app-1
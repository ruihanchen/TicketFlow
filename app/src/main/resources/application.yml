spring:
  application:
    name: ticketflow-app

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  datasource:
    url: jdbc:postgresql://localhost:5432/ticketflow
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000

  data:
    redis:
      # Override via REDIS_HOST / REDIS_PORT env vars in Docker or staging.
      # Defaults to localhost for local development.
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # Fail fast on unavailable Redis — 2s is enough for a local/Docker hop.
      # Without this, a dead Redis blocks each request for the default 60s timeout,
      # making the fallback path feel like a hang rather than a graceful degradation.
      timeout: 2000ms
      lettuce:
        pool:
          # Size the pool relative to the HikariCP pool (10).
          # Redis ops are faster than DB ops, so fewer connections suffice.
          max-active: 8
          max-idle: 4
          min-idle: 1
          # Don't queue indefinitely — surface back-pressure quickly.
          max-wait: 500ms

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
#        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  jackson:
    default-property-inclusion: non_null
    time-zone: UTC

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-change-in-production-min-32-chars}
  expiration-ms: 86400000

logging:
  level:
    com.chendev.ticketflow: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%logger{36}] - %msg%n"
spring:
  application:
    name: ticketflow-app

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ticketflow}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 2
      connection-timeout: 30000
      #logs a warning if a connection is held > 5s
      leak-detection-threshold: 5000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      #slow Redis throws RedisCommandTimeoutException; InventoryAdapter catches it and falls back to DB
      timeout: 500ms
      lettuce:
        shutdown-timeout: 600ms # > command timeout (500ms) so in-flight commands finish; << 30s shutdown budget

  jpa:
    hibernate:
      ddl-auto: validate #fail on startup if entity and schema diverge(never silently alter)
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        #batch never activates on the deductStock() path;saveAndFlush() commits one Inventory row per transaction
        jdbc.batch_size: 20
        order_inserts: true
    #keeps DB connections out of the view layer;default true holds a session open for the entire HTTP request
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false # Instant serializes as ISO-8601, not epoch millis

  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: 8080
  shutdown: graceful
  tomcat:
    threads:
      max: 400
    accept-count: 200 # OS TCP backlog
    mbeanregistry:
      enabled: true # required for TomcatMetrics to locate JMX beans; disabled by default to save memory

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      #when-authorized hides component internals from unauthenticated callers
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        #explicit: @ConditionalOnEnabledMetricsExport can silently evaluate false without this
        enabled: true
  metrics:
    distribution:
      #Grafana histogram_quantile() has no buckets to compute p95/p99  without this
      percentiles-histogram:
        http.server.requests: true

debezium:
  connector:
    name: ticketflow-inventory-connector
    table-include-list: public.inventories
    slot-name: ticketflow_debezium_slot # explicit name; default 'debezium' is too generic
    publication-name: ticketflow_debezium_pub
    tombstones-on-delete: false
    # when_needed re-snapshots if the saved LSN is no longer in WAL (DB restore, failover, volume replacement).
    # initial skips snapshot whenever an offset file exists, so it silently hangs in those scenarios.
    snapshot-mode: when_needed
  offset:
    storage-file: ${DEBEZIUM_OFFSET_FILE:./data/debezium/offsets.dat}
    # not /tmp -- /tmp cleanup causes full WAL replay on restart
    schema-history-file: ${DEBEZIUM_SCHEMA_HISTORY_FILE:./data/debezium/schema-history.dat}
    flush-interval-ms: ${DEBEZIUM_FLUSH_MS:1000} # 1s vs default 60s: limits duplicate delivery on crash

jwt:
  secret: ${JWT_SECRET:dev-only-secret-do-not-use-in-prod-1234}
  expiration-ms: 86400000

security:
  bcrypt:
    strength: ${BCRYPT_STRENGTH:10}

ticketflow:
  order:
    payment-window-minutes: 15
  timeout:
    fixed-delay: 60000
    batch-size: 100
    max-rounds: 50

logging:
  level:
    com.chendev.ticketflow: DEBUG
    org.springframework.security: INFO
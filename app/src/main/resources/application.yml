spring:
  application:
    name: ticketflow-app

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  datasource:
    url: jdbc:postgresql://localhost:5432/ticketflow
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 80
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
          max-wait: 500ms

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
    consumer:
      group-id: ticketflow-order-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.chendev.ticketflow.*"
      # Manual commit: consumer explicitly ACKs after successful processing.
      # auto-commit would ACK before processing — message loss on consumer crash.
      enable-auto-commit: false
      # Backpressure: limit messages pulled per poll cycle.
      # Prevents a large Kafka backlog from flooding the DB connection pool
      # when the consumer restarts after a sustained cancellation spike.
      # At 50 records/poll × 2 DB calls (Redis + DB) = 100 DB operations max per cycle.
      max-poll-records: 50

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  jackson:
    default-property-inclusion: non_null
    time-zone: UTC

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-change-in-production-min-32-chars}
  expiration-ms: 86400000

ticketflow:
  kafka:
    topics:
      order-cancelled: order.cancelled
      # DLQ topic follows Spring Kafka's default naming convention: {topic}.dlq
      # Messages exhausting retry attempts in KafkaConsumerConfig are published here.
      order-cancelled-dlq: order.cancelled.dlq

logging:
  level:
    com.chendev.ticketflow: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%logger{36}] - %msg%n"

spring:
  application:
    name: ticketflow-app

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ticketflow}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 2
      connection-timeout: 30000
      #Catch slow @Transactional or unclosed connections
      leak-detection-threshold: 5000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # slow Redis throws RedisCommandTimeoutException; InventoryAdapter catches it and falls back to DB
      timeout: 500ms
      # must exceed command timeout (500ms) so in-flight commands complete before shutdown.
      # well below timeout-per-shutdown-phase (30s) to leave Tomcat budget for HTTP draining
      lettuce:
        shutdown-timeout: 600ms

  jpa:
    hibernate:
      #fail on startup if entity and schema diverge(never silently alter)
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        #batch never activates on the deductStock() path;saveAndFlush() commits one Inventory row per transaction
        jdbc.batch_size: 20
        order_inserts: true
    #keeps DB connections out of the view layer;default true holds a session open for the entire HTTP request
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false  # Instant serializes as ISO-8601, not epoch millis

  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: 8080
  shutdown: graceful
  tomcat:
    threads:
      max: 400
    accept-count: 200 # OS TCP backlog

jwt:
  secret: ${JWT_SECRET:dev-only-secret-do-not-use-in-prod-1234}
  expiration-ms: 86400000

security:
  bcrypt:
    strength: ${BCRYPT_STRENGTH:10}

ticketflow:
  order:
    payment-window-minutes: 15
  timeout:
    fixed-delay: 60000
    batch-size: 100
    max-rounds: 50

logging:
  level:
    com.chendev.ticketflow: DEBUG
    org.springframework.security: INFO
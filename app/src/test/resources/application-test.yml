spring:
  flyway:
    enabled: true
  datasource:
    hikari:
      # Sizing rationale for ConcurrentInventoryTest (the most demanding test):
      #   200 threads × 2 connections per thread = 400 connections max
      #   (outer @Transactional in OrderService + REQUIRES_NEW in RedisInventoryAdapter)
      #   420 = 400 needed + 20 buffer for background threads
      maximum-pool-size: 420

  kafka:
    consumer:
      # Earliest offset ensures the test consumer reads messages produced
      # during the same test run, even if the consumer starts after the producer.
      auto-offset-reset: earliest

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

ticketflow:
  timeout:
    fixed-delay: 3600000        # 1 hour — prevent timeout job from firing during tests
  reconciliation:
    fixed-delay: 3600000        # 1 hour — prevent reconciliation job from firing during tests
spring:
  flyway:
    enabled: true
  datasource:
    hikari:
      # Sizing rationale (Transactionless Fast Path — ADR-008):
      #
      #   Before: 200 threads × 2 conns (outer tx + REQUIRES_NEW) = 420 required
      #   After:  rejected requests never touch DB; successful requests use 1 conn
      #
      #   Redis path:    0 conns (deductStock) + 1 conn (persistOrder) = 1 concurrent
      #   Fallback path: 1 conn (REQUIRES_NEW, released) + 1 conn (persistOrder) = 1 at a time
      #
      #   50 connections comfortably handles 200 concurrent threads because
      #   most threads are blocked in Redis (sub-ms), not holding DB connections.
      maximum-pool-size: 50

  kafka:
    consumer:
      # Earliest offset ensures the test consumer reads messages produced
      # during the same test run, even if the consumer starts after the producer.
      auto-offset-reset: earliest
      properties:
        # Trust all packages in test environment — avoids DeserializationException
        # when JsonDeserializer encounters OrderCancelledEvent from type headers.
        # Production application.yml already limits this to com.chendev.ticketflow.*
        spring.json.trusted.packages: "*"

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

ticketflow:
  timeout:
    fixed-delay: 3600000        # 1 hour — prevent timeout job from firing during tests
  reconciliation:
    fixed-delay: 3600000        # 1 hour — prevent reconciliation job from firing during tests